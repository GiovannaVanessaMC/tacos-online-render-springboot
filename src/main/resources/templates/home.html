<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	  xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mi Taco Online Shop</title>
	<link rel="icon" type="image/png" th:href="@{/images/logoTaco.png}">
	<link rel="stylesheet" th:href="@{/taco.css}" />
</head>
<body class="page page-home">

<div class="hero">
	<div class="top-bar">
		<div class="language-switch">
			<a th:href="@{/(lang='es')}" class="lang-btn">🇪🇸 ES</a>
			<a th:href="@{/(lang='en')}" class="lang-btn">🇬🇧 EN</a>
		</div>
	</div>

	<div class="hero-card">
		<div class="hero-text">
			<p class="eyebrow" th:text="#{home.eyebrow}">Tacos hechos a tu gusto</p>
			<h1 th:text="#{home.title}">Bienvenido</h1>
			<p class="subtitle" th:text="#{home.subtitle}">Subtítulo</p>

			<div class="hero-actions">
				<a th:href="@{/design}" class="btn btn-primary" th:text="#{home.button}">
					Diseñar mi taco personalizado
				</a>
			</div>
		</div>

		<div class="hero-image">
			<img class="taco-3d" th:src="@{/images/taco5.jfif}" alt="Taco" />
		</div>
	</div>


<br>
	<div class="music-control">
		<button onclick="toggleMusic()" class="music-btn">
			🎵 Dale Play
		</button>
	</div>

	<audio id="bg-music" loop>
		<source src="/music/musicaMex.mp3" type="audio/mpeg">
	</audio>
</div>

<script>
	function toggleMusic() {
		const music = document.getElementById("bg-music");

		if (music.paused) {
			music.play();
		} else {
			music.pause();
		}
	}
</script>
</body>
</html>
